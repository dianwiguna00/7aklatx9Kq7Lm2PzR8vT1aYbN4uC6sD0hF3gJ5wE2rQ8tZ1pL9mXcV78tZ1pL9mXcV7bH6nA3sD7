<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Sebuah taman berbentuk jajar genjang memiliki alas 18 m, tinggi 7 m, dan sisi miring 12 m. Hitunglah keliling dan luas taman tersebut!",
options:["Keliling = 60 m, Luas = 126 m²","Keliling = 60 m, Luas = 144 m²","Keliling = 72 m, Luas = 126 m²","Keliling = 72 m, Luas = 144 m²"],
correct:"Keliling = 60 m, Luas = 126 m²",
p:"Keliling jajar genjang dihitung dengan 2 × (alas + sisi miring) = 2 × (18 + 12) = 60 m. Luas jajar genjang = alas × tinggi = 18 × 7 = 126 m². Kunci jawaban pada soal diperbaiki sesuai perhitungan yang benar.",
img:""
},

{
q:"Sebuah jembatan berbentuk trapesium memiliki sisi sejajar 14 m dan 10 m, tinggi 6 m, serta dua sisi lainnya masing-masing 8 m dan 7 m. Berapakah keliling dan luas jembatan tersebut?",
options:["Keliling = 39 m, Luas = 72 m²","Keliling = 39 m, Luas = 48 m²","Keliling = 40 m, Luas = 72 m²","Keliling = 40 m, Luas = 48 m²"],
correct:"Keliling = 39 m, Luas = 72 m²",
p:"Keliling trapesium adalah jumlah seluruh sisinya: 14 + 10 + 8 + 7 = 39 m. Luas trapesium = ½ × (jumlah sisi sejajar) × tinggi = ½ × (14 + 10) × 6 = 72 m².",
img:""
},

{
q:"Sebuah hiasan dinding berbentuk belah ketupat memiliki panjang sisi 15 cm, diagonal 1 = 24 cm, dan diagonal 2 = 10 cm. Hitunglah keliling dan luas hiasan tersebut!",
options:["Keliling = 60 cm, Luas = 120 cm²","Keliling = 60 cm, Luas = 180 cm²","Keliling = 50 cm, Luas = 120 cm²","Keliling = 50 cm, Luas = 180 cm²"],
correct:"Keliling = 60 cm, Luas = 120 cm²",
p:"Keliling belah ketupat = 4 × sisi = 4 × 15 = 60 cm. Luas belah ketupat = ½ × diagonal 1 × diagonal 2 = ½ × 24 × 10 = 120 cm².",
img:""
},

{
q:"Sebuah lapangan parkir berbentuk jajar genjang memiliki alas 25 m, tinggi 8 m, dan sisi miring 14 m. Hitunglah keliling dan luas lapangan parkir tersebut!",
options:["Keliling = 78 m, Luas = 200 m²","Keliling = 78 m, Luas = 220 m²","Keliling = 60 m, Luas = 200 m²","Keliling = 60 m, Luas = 220 m²"],
correct:"Keliling = 78 m, Luas = 200 m²",
p:"Keliling = 2 × (alas + sisi miring) = 2 × (25 + 14) = 78 m. Luas = alas × tinggi = 25 × 8 = 200 m².",
img:""
},

{
q:"Sebuah taman kota berbentuk trapesium memiliki sisi sejajar 20 m dan 12 m, tinggi 9 m, serta dua sisi lainnya masing-masing 7 m dan 9 m. Berapakah keliling dan luas taman kota tersebut?",
options:["Keliling = 48 m, Luas = 144 m²","Keliling = 48 m, Luas = 72 m²","Keliling = 46 m, Luas = 144 m²","Keliling = 46 m, Luas = 72 m²"],
correct:"Keliling = 48 m, Luas = 144 m²",
p:"Keliling trapesium = 20 + 12 + 7 + 9 = 48 m. Luas = ½ × (20 + 12) × 9 = 144 m².",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
