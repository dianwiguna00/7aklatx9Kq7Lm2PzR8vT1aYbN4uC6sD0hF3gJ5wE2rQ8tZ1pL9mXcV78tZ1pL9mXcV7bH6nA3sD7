<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Perhatikan tabel berikut tentang harga minyak goreng.\n Liter | Harga Total (Rp)\n1 | 14.000\n2 | 28.000\n3 | 42.000\n4 | 56.000\n5 | 70.000\n6 | 84.000\n\nBerdasarkan tabel di atas, berapakah harga untuk 5 liter minyak goreng?",
options:["Rp56.000","Rp60.000","Rp70.000","Rp75.000"],
correct:"Rp70.000",
p:"Dari tabel terlihat bahwa harga minyak goreng berbanding senilai dengan jumlah liter. Harga per liter adalah Rp14.000 sehingga harga untuk 5 liter adalah 5 × Rp14.000 = Rp70.000. Kunci jawaban pada soal sebelumnya diperbaiki.",
img:""
},

{
q:"Sebuah mobil menempuh jarak 60 km setiap jam. Berikut tabel jarak tempuh selama beberapa jam:\n\nWaktu (jam) | Jarak (km)\n1 | 60\n2 | 120\n3 | 180\n4 | 240\n5 | 300\n\nJika mobil berjalan selama 4 jam, berapa jarak yang ditempuh?",
options:["120 km","180 km","240 km","300 km"],
correct:"240 km",
p:"Mobil menempuh jarak 60 km setiap jam. Maka dalam 4 jam jarak yang ditempuh adalah 4 × 60 = 240 km.",
img:""
},

{
q:"Perhatikan grafik hubungan antara jumlah buku tulis dan harga total berikut (setiap buku seharga Rp3.500):\n\nJumlah Buku: 1  2  4  6\nHarga Total: 3.500  7.000  14.000  21.000\n\nBerapakah harga untuk 4 buku tulis?",
options:["Rp7.000","Rp10.500","Rp14.000","Rp21.000"],
correct:"Rp14.000",
p:"Harga satu buku adalah Rp3.500. Maka harga untuk 4 buku adalah 4 × Rp3.500 = Rp14.000.",
img:""
},

{
q:"Berikut adalah tabel waktu dan jarak tempuh sepeda:\n\nWaktu (jam) | Jarak (km)\n1 | 25\n2 | 50\n3 | 75\n4 | 100\n\nJika sepeda berjalan selama 3 jam, berapa jarak yang ditempuh?",
options:["50 km","60 km","75 km","100 km"],
correct:"75 km",
p:"Berdasarkan tabel, sepeda menempuh jarak 25 km setiap jam. Dalam 3 jam jarak yang ditempuh adalah 3 × 25 = 75 km.",
img:""
},

{
q:"Berdasarkan grafik garis lurus yang melalui titik (0,0) dan (5,50), hubungan antara waktu (jam) dan jarak (km) adalah...",
options:["Setiap jam bertambah 5 km","Setiap jam bertambah 10 km","Setiap jam bertambah 50 km","Setiap jam bertambah 25 km"],
correct:"Setiap jam bertambah 10 km",
p:"Grafik melalui titik (0,0) dan (5,50) menunjukkan jarak 50 km ditempuh dalam 5 jam. Gradien grafik adalah 50 ÷ 5 = 10 km per jam. Jadi setiap jam jarak bertambah 10 km. Kunci jawaban dikoreksi sesuai konsep gradien grafik.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
