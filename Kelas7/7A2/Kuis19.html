<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Diberikan data berikut:\nBangun Datar | Keliling (cm) | Luas (cm²)\nPersegi | 24 | 36\nSegitiga | 26 | 30\nLingkaran | 31,4 | 78,5\n\nBerdasarkan data tersebut, bangun datar yang memiliki keliling terbesar adalah...",
options:["Persegi","Segitiga","Lingkaran","Semua sama"],
correct:"Lingkaran",
p:"Dari data keliling pada tabel terlihat bahwa persegi memiliki keliling 24 cm, segitiga 26 cm, dan lingkaran 31,4 cm. Nilai keliling terbesar adalah 31,4 cm, sehingga bangun datar dengan keliling terbesar adalah lingkaran.",
img:""
},

{
q:"Grafik batang menunjukkan luas dari tiga bangun datar: Persegi (49 cm²), Jajar Genjang (60 cm²), Belah Ketupat (48 cm²). Bangun datar dengan luas terkecil adalah...",
options:["Persegi","Jajar Genjang","Belah Ketupat","Semua sama"],
correct:"Belah Ketupat",
p:"Berdasarkan data luas pada grafik, persegi memiliki luas 49 cm², jajar genjang 60 cm², dan belah ketupat 48 cm². Luas terkecil adalah 48 cm² sehingga bangun datar dengan luas terkecil adalah belah ketupat.",
img:""
},

{
q:"Dalam sebuah tabel, tercatat bahwa sebuah trapesium memiliki sisi sejajar 12 cm dan 8 cm, tinggi 5 cm, serta dua sisi lainnya masing-masing 6 cm dan 7 cm. Luas trapesium tersebut adalah...",
options:["50 cm²","33 cm²","60 cm²","45 cm²"],
correct:"50 cm²",
p:"Luas trapesium dihitung menggunakan rumus ½ × (jumlah sisi sejajar) × tinggi. Luas = ½ × (12 + 8) × 5 = ½ × 20 × 5 = 50 cm².",
img:""
},

{
q:"Sebuah grafik menunjukkan keliling dari tiga bangun datar: Persegi Panjang (40 cm), Segitiga (26 cm), Lingkaran (31,4 cm). Bangun datar dengan keliling terkecil adalah...",
options:["Persegi Panjang","Segitiga","Lingkaran","Tidak dapat ditentukan"],
correct:"Segitiga",
p:"Dari grafik diketahui keliling persegi panjang 40 cm, segitiga 26 cm, dan lingkaran 31,4 cm. Keliling terkecil adalah 26 cm, sehingga bangun datar dengan keliling terkecil adalah segitiga.",
img:""
},

{
q:"Dalam sebuah tabel, tercatat bahwa sebuah lingkaran memiliki jari-jari 7 cm. Jika π = 22/7, maka luas lingkaran tersebut adalah...",
options:["154 cm²","44 cm²","78,5 cm²","49 cm²"],
correct:"154 cm²",
p:"Luas lingkaran dihitung dengan rumus L = π × r². Dengan r = 7 cm dan π = 22/7, diperoleh L = 22/7 × 7² = 22/7 × 49 = 154 cm².",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
