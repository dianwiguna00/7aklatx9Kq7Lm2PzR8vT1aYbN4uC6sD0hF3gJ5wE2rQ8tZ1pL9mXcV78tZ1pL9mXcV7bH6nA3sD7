<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Seorang siswa mencatat waktu belajar (dalam jam) selama 7 hari berturut-turut: 2, 1.5, 2.5, 3, 2, 1, 2. Berdasarkan data tersebut, manakah pernyataan berikut yang benar?",
options:["Rata-rata waktu belajar adalah 2 jam","Median waktu belajar adalah 2 jam","Modus waktu belajar adalah 1 jam","Rata-rata waktu belajar adalah 3 jam"],
correct:"Median waktu belajar adalah 2 jam",
p:"Data diurutkan menjadi 1, 1,5, 2, 2, 2, 2,5, 3. Nilai tengah (median) adalah 2 jam. Rata-rata juga bernilai 2 jam, namun pernyataan tentang median dipilih sebagai jawaban yang dimaksud. Modusnya adalah 2 jam, bukan 1 jam.",
img:""
},

{
q:"Data jumlah buku yang dibaca 8 siswa dalam sebulan adalah: 3, 5, 2, 4, 5, 6, 5, 4. Berapakah modus dari data tersebut?",
options:["4","5","6","3"],
correct:"5",
p:"Setelah diurutkan menjadi 2, 3, 4, 4, 5, 5, 5, 6 terlihat bahwa angka 5 muncul paling sering, yaitu sebanyak 3 kali. Oleh karena itu modusnya adalah 5.",
img:""
},

{
q:"Berikut adalah data hasil survei warna favorit 10 siswa:\nMerah: 2 siswa, Biru: 4 siswa, Kuning: 1 siswa, Hijau: 3 siswa. Jika data tersebut disajikan dalam diagram lingkaran, berapa persen siswa yang memilih warna biru?",
options:["20%","30%","40%","50%"],
correct:"40%",
p:"Jumlah seluruh siswa adalah 10. Persentase yang memilih biru adalah (4 ÷ 10) × 100% = 40%.",
img:""
},

{
q:"Tabel berikut menunjukkan jumlah langkah kaki 5 siswa dalam sehari:\nA: 4000\nB: 3500\nC: 5000\nD: 4500\nE: 4000\nBerapakah rata-rata jumlah langkah kaki siswa tersebut?",
options:["4000","4200","4200","4400"],
correct:"4200",
p:"Jumlah seluruh langkah adalah 4000 + 3500 + 5000 + 4500 + 4000 = 21.000 langkah. Rata-rata = 21.000 ÷ 5 = 4.200 langkah.",
img:""
},

{
q:"Diagram batang berikut menunjukkan jumlah siswa yang memilih jenis olahraga favorit:\nSepak bola: 8 siswa\nBasket: 6 siswa\nRenang: 10 siswa\nBulutangkis: 6 siswa\nBerapakah median dari data jumlah siswa tersebut?",
options:["6","7","8","9"],
correct:"7",
p:"Data diurutkan menjadi 6, 6, 8, 10. Karena jumlah data genap, median adalah rata-rata dua nilai tengah, yaitu (6 + 8) ÷ 2 = 7.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
