<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Sebuah iklan menawarkan diskon 20% untuk sepatu seharga Rp500.000 dan cashback Rp25.000. Berapa harga akhir yang harus dibayar?\n",
options:["Rp400.000","Rp375.000","Rp425.000","Rp475.000"],
correct:"Rp375.000",
p:"Diskon 20% dari Rp500.000 adalah Rp100.000 sehingga harga setelah diskon menjadi Rp400.000. Setelah itu diberi cashback Rp25.000, maka harga akhir yang harus dibayar adalah Rp400.000 − Rp25.000 = Rp375.000.",
img:""
},
{
q:"Brosur menyebutkan diskon 15% untuk tas seharga Rp320.000 dan potongan langsung Rp20.000 jika belanja di atas Rp300.000. Berapa harga akhir tas tersebut?\n",
options:["Rp272.000","Rp280.000","Rp252.000","Rp248.000"],
correct:"Rp252.000",
p:"Diskon 15% dari Rp320.000 adalah Rp48.000 sehingga harga setelah diskon menjadi Rp272.000. Kemudian diberikan potongan langsung Rp20.000, maka harga akhir = Rp272.000 − Rp20.000 = Rp252.000.",
img:""
},
{
q:"Iklan menyebutkan beli 2 kemeja masing-masing Rp150.000, diskon 10% untuk pembelian kedua, dan gratis ongkir Rp20.000. Berapa total harga yang harus dibayar?\n",
options:["Rp285.000","Rp300.000","Rp290.000","Rp270.000"],
correct:"Rp285.000",
p:"Harga kemeja pertama Rp150.000. Kemeja kedua mendapat diskon 10% sehingga harganya menjadi Rp135.000. Total harga sebelum ongkir = Rp150.000 + Rp135.000 = Rp285.000. Gratis ongkir tidak menambah biaya sehingga total yang dibayar tetap Rp285.000.",
img:""
},
{
q:"Sebuah brosur menawarkan diskon 25% untuk jaket seharga Rp400.000. Berapa harga setelah diskon?\n",
options:["Rp300.000","Rp320.000","Rp280.000","Rp350.000"],
correct:"Rp300.000",
p:"Diskon 25% dari Rp400.000 adalah Rp100.000. Harga setelah diskon diperoleh dengan mengurangi harga awal dengan diskon, yaitu Rp400.000 − Rp100.000 = Rp300.000.",
img:""
},
{
q:"Promo: Beli 3 barang masing-masing Rp100.000, Rp150.000, dan Rp200.000. Diskon 10% untuk semua barang. Berapa total harga setelah diskon?\n",
options:["Rp405.000","Rp400.000","Rp385.000","Rp395.000"],
correct:"Rp405.000",
p:"Total harga awal = Rp100.000 + Rp150.000 + Rp200.000 = Rp450.000. Diskon 10% dari Rp450.000 adalah Rp45.000. Harga setelah diskon = Rp450.000 − Rp45.000 = Rp405.000.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
