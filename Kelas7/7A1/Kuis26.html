<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Sebuah toko menjual televisi seharga Rp4.000.000. Toko memberikan diskon 10% dan mengenakan PPN 11% dari harga setelah diskon. Berapa harga akhir yang harus dibayar pembeli?\n",
options:["Rp3.960.000","Rp3.996.000","Rp4.400.000","Rp4.140.000"],
correct:"Rp3.996.000",
p:"Diskon 10% dari Rp4.000.000 adalah Rp400.000 sehingga harga setelah diskon Rp3.600.000. PPN 11% dari Rp3.600.000 adalah Rp396.000. Harga akhir yang harus dibayar = Rp3.600.000 + Rp396.000 = Rp3.996.000.",
img:""
},
{
q:"Seorang pedagang membeli 10 blender seharga Rp250.000 per buah. Ia memberikan diskon 20% kepada pembeli dan tetap mendapat untung Rp20.000 per buah setelah diskon. Berapa harga jual sebelum diskon?\n",
options:["Rp300.000","Rp270.000","Rp280.000","Rp337.500"],
correct:"Rp337.500",
p:"Harga beli per buah Rp250.000 dan untung Rp20.000, sehingga harga jual setelah diskon Rp270.000. Karena diskon 20%, maka harga setelah diskon = 80% dari harga awal. Harga jual sebelum diskon = Rp270.000 ÷ 0,8 = Rp337.500.",
img:""
},
{
q:"Kamu menabung Rp2.000.000 di bank dengan bunga tunggal 5% per tahun. Setelah 2 tahun, kamu ingin membeli handphone seharga Rp2.100.000 yang dikenai PPN 10%. Apakah tabunganmu cukup?\n",
options:["Cukup, sisa Rp100.000","Tidak cukup, kurang Rp110.000","Cukup pas","Tidak cukup, kurang Rp10.000"],
correct:"Tidak cukup, kurang Rp110.000",
p:"Bunga tunggal = (5 × 2.000.000 × 2) / 100 = Rp200.000 sehingga total tabungan Rp2.200.000. Harga HP setelah PPN 10% = Rp2.100.000 + Rp210.000 = Rp2.310.000. Kekurangan dana = Rp2.310.000 − Rp2.200.000 = Rp110.000.",
img:""
},
{
q:"Sebuah toko menjual kulkas seharga Rp3.500.000. Toko memberikan diskon 15% dan mengenakan PPN 10%. Berapa harga akhir yang harus dibayar?\n",
options:["Rp3.332.500","Rp3.500.000","Rp3.267.500","Rp3.400.000"],
correct:"Rp3.272.500",
p:"Diskon 15% dari Rp3.500.000 adalah Rp525.000 sehingga harga setelah diskon Rp2.975.000. PPN 10% dari Rp2.975.000 adalah Rp297.500. Harga akhir = Rp2.975.000 + Rp297.500 = Rp3.272.500. Kunci sebelumnya tidak sesuai dan telah diperbaiki.",
img:""
},
{
q:"Sebuah investasi sebesar Rp5.000.000 menghasilkan bunga tunggal 10% per tahun. Berapa nilai akhir investasi setelah 1,5 tahun?\n",
options:["Rp5.750.000","Rp5.500.000","Rp5.250.000","Rp5.000.000"],
correct:"Rp5.750.000",
p:"Bunga tunggal = (10 × 5.000.000 × 1,5) / 100 = Rp750.000. Nilai akhir investasi = Rp5.000.000 + Rp750.000 = Rp5.750.000. Jawaban pada soal sebelumnya keliru dan diperbaiki sesuai perhitungan.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
