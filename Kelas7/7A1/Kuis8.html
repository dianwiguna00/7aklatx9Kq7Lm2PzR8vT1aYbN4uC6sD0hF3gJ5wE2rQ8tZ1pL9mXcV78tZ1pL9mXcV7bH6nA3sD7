<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Seorang ibu menggunakan 2/3 liter minyak untuk satu resep. Jika ia membuat 4 resep, berapa liter minyak yang digunakan?\n\n",
options:["8/3 liter","6/3 liter","4/3 liter","2/4 liter"],
correct:"8/3 liter",
p:"Setiap resep memerlukan 2/3 liter minyak. Untuk 4 resep, dilakukan perkalian: 2/3 × 4 = 8/3. Jadi minyak yang digunakan adalah 8/3 liter.",
img:""
},
{
q:"Sebuah pita sepanjang 5/6 meter dibagi menjadi 5 bagian sama panjang. Berapa panjang setiap bagian?\n\n",
options:["1/6 meter","5/5 meter","6/5 meter","5/30 meter"],
correct:"1/6 meter",
p:"Panjang pita dibagi 5 sama besar: 5/6 ÷ 5 = 5/6 × 1/5 = 5/30 = 1/6 meter. Jadi setiap bagian panjangnya 1/6 meter.",
img:""
},
{
q:"Hitung hasil dari 3/4 × 6.\n\n",
options:["18/4","9/2","6/4","3/10"],
correct:"9/2",
p:"Perkalian dilakukan dengan mengalikan pembilang: 3/4 × 6 = 18/4. Pecahan tersebut dapat disederhanakan menjadi 9/2.",
img:""
},
{
q:"Hitung hasil dari 7/8 ÷ 2.\n\n",
options:["7/16","7/4","8/14","2/7"],
correct:"7/16",
p:"Pembagian dengan 2 sama dengan dikalikan 1/2: 7/8 ÷ 2 = 7/8 × 1/2 = 7/16.",
img:""
},
{
q:"Seorang anak minum 2/5 liter susu setiap hari. Berapa liter susu yang diminum dalam 5 hari?\n\n",
options:["10/5 liter","2/25 liter","1 liter","2 liter"],
correct:"2 liter",
p:"Setiap hari minum 2/5 liter selama 5 hari, sehingga: 2/5 × 5 = 10/5 = 2. Jadi total susu yang diminum adalah 2 liter. Kunci jawaban semula belum disederhanakan.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
